<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0" />
    <title>Idle Superpowers (Proxied)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body, html { padding: 0; margin: 0; width: 100%; height: 100%; background: #231F20; overflow: hidden; touch-action: none; }
      #unity-container { position: absolute; width: 100%; height: 100%; left: 0; top: 0; }
      #unity-canvas { background: #231F20; width: 100%; height: 100%; display: block; outline: none; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
      #unity-logo { width: 154px; height: 130px; background: url('https://api.codetabs.com/v1/proxy/?quest=https://www.lutsgames.com/games/idle-superpowers/TemplateData/lutsgameslogo.png') no-repeat center; background-size: contain; margin: 0 auto; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: url('https://api.codetabs.com/v1/proxy/?quest=https://www.lutsgames.com/games/idle-superpowers/TemplateData/progress-bar-empty-dark.png') no-repeat center; }
      #unity-progress-bar-full { width: 0%; height: 18px; margin-top: 0; background: url('https://api.codetabs.com/v1/proxy/?quest=https://www.lutsgames.com/games/idle-superpowers/TemplateData/progress-bar-full-dark.png') no-repeat left; overflow: hidden; }
    </style>
  </head>
  <body class="bg-[#231F20] text-white flex items-center justify-center">
    <div id="unity-container" class="w-full h-full relative">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty" class="relative">
          <div id="unity-progress-bar-full" class="absolute top-0 left-0 h-full"></div>
        </div>
        <div class="mt-4 text-sm font-sans text-gray-300 tracking-wider">Loading Idle Superpowers (via Proxy)...</div>
      </div>
    </div>
    
    <script>
      // Proxy base URL to bypass CORS and frame restrictions
      var proxyBase = "https://api.codetabs.com/v1/proxy/?quest=https://www.lutsgames.com/games/idle-superpowers/";
      var buildUrl = proxyBase + "Build";
      var loaderUrl = buildUrl + "/webbuild.loader.js";
      var config = {
        dataUrl: buildUrl + "/webbuild.data",
        frameworkUrl: buildUrl + "/webbuild.framework.js",
        codeUrl: buildUrl + "/webbuild.wasm",
        streamingAssetsUrl: proxyBase + "StreamingAssets",
        companyName: "lutsgames",
        productName: "Idle Superpowers",
        productVersion: "1.2.4",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      // Show loading bar
      loadingBar.style.display = "flex";

      // Dynamically load the Unity WebGL loader through the proxy
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        // Initialize Unity once loader is ready
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert("Unity Error: " + message);
        });
      };
      script.onerror = () => {
        alert("Failed to load Unity loader script through the proxy.");
      };
      document.body.appendChild(script);

      // Handle window resizing to keep the canvas properly scaled
      function resizeCanvas() {
        if (canvas) {
          canvas.width = canvas.clientWidth * window.devicePixelRatio;
          canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
      }
      
      window.addEventListener('resize', resizeCanvas);
      
      // Initial sizing with slight delay to ensure DOM is fully ready
      setTimeout(resizeCanvas, 100);
    </script>
  </body>
</html>
