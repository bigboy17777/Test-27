<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elijah's Games</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .title-font { font-family: 'Orbitron', sans-serif; }
    .code-font { font-family: 'Fira Code', monospace; }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .orb-1 { width: 300px; height: 300px; background: #6366f1; top: -100px; left: -50px; animation-delay: 0s; }
    .orb-2 { width: 250px; height: 250px; background: #8b5cf6; bottom: -80px; right: -50px; animation-delay: -3s; }
    .orb-3 { width: 200px; height: 200px; background: #06b6d4; top: 50%; left: 60%; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .glow-text {
      text-shadow:
        0 0 10px rgba(99, 102, 241, 0.5),
        0 0 40px rgba(99, 102, 241, 0.3),
        0 0 80px rgba(99, 102, 241, 0.1);
    }

    .file-drop-zone {
      border: 2px dashed rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .file-drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
      transition: all 0.3s ease;
    }

    .file-drop-zone:hover {
      border-color: rgba(99, 102, 241, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15);
    }

    .file-drop-zone:hover::before {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
    }

    .file-drop-zone.drag-over {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.1);
      transform: scale(1.02);
    }

    .btn-play {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-play::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-play:hover::before { opacity: 1; }

    .btn-play:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .btn-play:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-run {
      background: linear-gradient(135deg, #10b981, #059669);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-run::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #34d399, #10b981);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-run:hover::before { opacity: 1; }

    .btn-run:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .btn-run:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-exit { transition: all 0.2s ease; }
    .btn-exit:hover { background: rgba(239, 68, 68, 0.9); transform: scale(1.05); }

    #game-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 1000;
      background: #000;
      display: none;
    }

    #exit-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1001;
      display: none;
    }

    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .game-item { transition: all 0.2s ease; }
    .game-item:hover { background: rgba(99, 102, 241, 0.1); transform: translateX(4px); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Tab styling */
    .tab-btn {
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      border-color: #6366f1;
      color: #a5b4fc;
    }

    .tab-btn:not(.active):hover {
      color: #9ca3af;
    }

    /* Code editor */
    #code-editor {
      background: #0d0d14;
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #e2e8f0;
      resize: none;
      tab-size: 2;
      line-height: 1.6;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #code-editor:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    #code-editor::placeholder {
      color: #374151;
    }

    /* Line numbers gutter look */
    .editor-wrapper {
      position: relative;
    }

    .editor-wrapper::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #6366f1, #8b5cf6, #06b6d4);
      border-radius: 3px 0 0 3px;
      z-index: 1;
    }

    .char-count {
      transition: color 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>

  <!-- Main UI -->
  <div id="main-ui" class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 py-8">

    <!-- Header -->
    <div class="text-center mb-8 fade-in">
      <div class="flex items-center justify-center gap-3 mb-3">
        <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.63 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.58-5.84a14.927 14.927 0 00-2.58 5.841m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
        </svg>
        <h1 class="title-font text-4xl md:text-5xl font-black text-white glow-text tracking-wider">
          Elijah's Games
        </h1>
        <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.63 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.58-5.84a14.927 14.927 0 00-2.58 5.841m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
        </svg>
      </div>
      <p class="text-gray-500 text-sm tracking-widest uppercase">Load & Play Local HTML Games</p>
    </div>

    <!-- Card container -->
    <div class="w-full max-w-2xl fade-in" style="animation-delay: 0.15s;">
      <div class="bg-gray-900/70 backdrop-blur-xl rounded-2xl border border-gray-800/60 shadow-2xl p-8">

        <!-- Tabs -->
        <div class="flex gap-1 mb-6 border-b border-gray-800/60">
          <button onclick="switchTab('file')" id="tab-file" class="tab-btn active px-5 py-3 text-sm font-semibold text-gray-400 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            Upload File
          </button>
          <button onclick="switchTab('code')" id="tab-code" class="tab-btn px-5 py-3 text-sm font-semibold text-gray-600 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
            </svg>
            Paste Code
          </button>
        </div>

        <!-- File Upload Tab -->
        <div id="panel-file">
          <!-- File drop zone -->
          <div id="drop-zone" class="file-drop-zone rounded-xl p-8 text-center mb-6"
               onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept=".html,.htm" class="hidden">
            <div class="relative z-10">
              <div id="upload-icon" class="mx-auto w-16 h-16 rounded-full bg-indigo-500/10 flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
              </div>
              <p id="file-label" class="text-gray-300 font-semibold mb-1">Choose an HTML Game File</p>
              <p class="text-gray-600 text-sm">Click to browse or drag & drop</p>
            </div>
          </div>

          <!-- Selected file info -->
          <div id="file-info" class="hidden mb-6 bg-indigo-500/10 border border-indigo-500/20 rounded-xl p-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-indigo-500/20 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <div class="min-w-0 flex-1">
              <p id="file-name" class="text-white font-medium text-sm truncate"></p>
              <p id="file-size" class="text-gray-500 text-xs"></p>
            </div>
            <button onclick="clearFile(event)" class="text-gray-500 hover:text-red-400 transition p-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <!-- Launch button -->
          <button id="play-btn" onclick="launchGame()" disabled
            class="btn-play w-full py-4 rounded-xl text-white font-bold text-lg tracking-wide flex items-center justify-center gap-3">
            <span class="relative z-10 flex items-center gap-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Launch Game
            </span>
          </button>
        </div>

        <!-- Code Editor Tab -->
        <div id="panel-code" class="hidden">
          <!-- Editor toolbar -->
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-1.5">
                <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
                <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
              </div>
              <span class="text-gray-600 text-xs code-font">editor.html</span>
            </div>
            <div class="flex items-center gap-3">
              <span id="char-count" class="char-count text-gray-700 text-xs code-font">0 chars</span>
              <button onclick="clearCode()" class="text-gray-600 hover:text-red-400 transition text-xs flex items-center gap-1 px-2 py-1 rounded hover:bg-gray-800/50">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Clear
              </button>
            </div>
          </div>

          <!-- Code textarea -->
          <div class="editor-wrapper mb-4">
            <textarea
              id="code-editor"
              class="code-font w-full rounded-xl p-5 pl-6 text-sm"
              rows="14"
              placeholder="Paste your HTML, CSS, JavaScript code here...

Example:
<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #111; color: white; }
  </style>
</head>
<body>
  <h1>My Game</h1>
  <script>
    // Your game code here
  </script>
</body>
</html>"
              spellcheck="false"
              oninput="updateCharCount()"
            ></textarea>
          </div>

          <!-- Helper hints -->
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="text-[10px] px-2 py-1 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">HTML</span>
            <span class="text-[10px] px-2 py-1 rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">CSS</span>
            <span class="text-[10px] px-2 py-1 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">JavaScript</span>
            <span class="text-[10px] px-2 py-1 rounded-full bg-purple-500/10 text-purple-400 border border-purple-500/20">Canvas</span>
            <span class="text-[10px] px-2 py-1 rounded-full bg-pink-500/10 text-pink-400 border border-pink-500/20">SVG</span>
            <span class="text-gray-700 text-[10px] ml-auto self-center">Supports all web code</span>
          </div>

          <!-- Run button -->
          <button id="run-btn" onclick="runCode()" disabled
            class="btn-run w-full py-4 rounded-xl text-white font-bold text-lg tracking-wide flex items-center justify-center gap-3">
            <span class="relative z-10 flex items-center gap-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              Run Code
            </span>
          </button>
        </div>

        <!-- Recent games -->
        <div id="recent-section" class="hidden mt-6 pt-6 border-t border-gray-800/60">
          <h3 class="text-gray-500 text-xs font-semibold uppercase tracking-widest mb-3 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Recently Played
          </h3>
          <div id="recent-list" class="space-y-1 max-h-40 overflow-y-auto"></div>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-gray-700 text-xs mt-6">All games run locally in your browser — nothing is uploaded.</p>
    </div>
  </div>

  <!-- Fullscreen game view -->
  <iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"></iframe>
  <button id="exit-btn" onclick="exitGame()"
    class="btn-exit bg-red-600/80 backdrop-blur text-white px-4 py-2 rounded-lg font-semibold text-sm flex items-center gap-2 shadow-lg">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    Exit Game
  </button>

  <script>
    // === State ===
    let selectedFileURL = null;
    let selectedFileName = '';
    let currentTab = 'file';

    // === DOM Elements ===
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const fileInfo = document.getElementById('file-info');
    const playBtn = document.getElementById('play-btn');
    const runBtn = document.getElementById('run-btn');
    const codeEditor = document.getElementById('code-editor');

    // === Tab Switching ===
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-file').classList.toggle('active', tab === 'file');
      document.getElementById('tab-code').classList.toggle('active', tab === 'code');
      document.getElementById('tab-file').classList.toggle('text-gray-400', tab === 'file');
      document.getElementById('tab-file').classList.toggle('text-gray-600', tab !== 'file');
      document.getElementById('tab-code').classList.toggle('text-gray-400', tab === 'code');
      document.getElementById('tab-code').classList.toggle('text-gray-600', tab !== 'code');
      document.getElementById('panel-file').classList.toggle('hidden', tab !== 'file');
      document.getElementById('panel-code').classList.toggle('hidden', tab !== 'code');
    }

    // === Code Editor ===
    function updateCharCount() {
      const len = codeEditor.value.length;
      const countEl = document.getElementById('char-count');
      countEl.textContent = len.toLocaleString() + ' chars';
      runBtn.disabled = len === 0;

      if (len > 0) {
        countEl.classList.remove('text-gray-700');
        countEl.classList.add('text-green-500');
      } else {
        countEl.classList.add('text-gray-700');
        countEl.classList.remove('text-green-500');
      }
    }

    function clearCode() {
      codeEditor.value = '';
      updateCharCount();
    }

    // Handle tab key in textarea
    codeEditor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = codeEditor.selectionStart;
        const end = codeEditor.selectionEnd;
        codeEditor.value = codeEditor.value.substring(0, start) + '  ' + codeEditor.value.substring(end);
        codeEditor.selectionStart = codeEditor.selectionEnd = start + 2;
        updateCharCount();
      }
    });

    function runCode() {
      const code = codeEditor.value.trim();
      if (!code) return;

      const frame = document.getElementById('game-frame');
      const exitBtn = document.getElementById('exit-btn');
      const mainUI = document.getElementById('main-ui');

      // Determine if it's a full HTML document or a snippet
      let fullHTML;
      const lowerCode = code.toLowerCase();
      if (lowerCode.includes('<!doctype') || lowerCode.includes('<html') || lowerCode.includes('<head') || lowerCode.includes('<body')) {
        // It's a full HTML document
        fullHTML = code;
      } else {
        // It's a snippet — wrap it in a basic HTML document
        fullHTML = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
</style>
</head>
<body>
${code}
</body>
</html>`;
      }

      // Create blob URL
      const blob = new Blob([fullHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);

      frame.src = url;
      frame.style.display = 'block';
      exitBtn.style.display = 'flex';
      mainUI.style.display = 'none';

      // Try real fullscreen
      document.documentElement.requestFullscreen?.().catch(() => {});

      // Save to recent
      const preview = code.substring(0, 40).replace(/</g, '').replace(/>/g, '').trim();
      saveRecent('Code: ' + (preview || 'Untitled') + '...');

      // Clean up blob URL after some time
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    // === File Upload ===
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && (file.name.endsWith('.html') || file.name.endsWith('.htm'))) {
        handleFile(file);
      }
    });

    function handleFile(file) {
      if (selectedFileURL) URL.revokeObjectURL(selectedFileURL);
      selectedFileURL = URL.createObjectURL(file);
      selectedFileName = file.name;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = formatSize(file.size);
      fileInfo.classList.remove('hidden');
      document.getElementById('file-label').textContent = 'File Selected!';
      playBtn.disabled = false;
      saveRecent(file.name);
    }

    function clearFile(e) {
      e.stopPropagation();
      if (selectedFileURL) URL.revokeObjectURL(selectedFileURL);
      selectedFileURL = null;
      selectedFileName = '';
      fileInput.value = '';
      fileInfo.classList.add('hidden');
      document.getElementById('file-label').textContent = 'Choose an HTML Game File';
      playBtn.disabled = true;
    }

    function launchGame() {
      if (!selectedFileURL) return;
      const frame = document.getElementById('game-frame');
      const exitBtn = document.getElementById('exit-btn');
      const mainUI = document.getElementById('main-ui');

      frame.src = selectedFileURL;
      frame.style.display = 'block';
      exitBtn.style.display = 'flex';
      mainUI.style.display = 'none';

      document.documentElement.requestFullscreen?.().catch(() => {});
    }

    function exitGame() {
      const frame = document.getElementById('game-frame');
      const exitBtn = document.getElementById('exit-btn');
      const mainUI = document.getElementById('main-ui');

      frame.src = '';
      frame.style.display = 'none';
      exitBtn.style.display = 'none';
      mainUI.style.display = 'flex';

      if (document.fullscreenElement) document.exitFullscreen?.();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') exitGame();
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // === Recent Games ===
    function saveRecent(name) {
      let recent = JSON.parse(localStorage.getItem('elijahGamesRecent') || '[]');
      recent = recent.filter(r => r !== name);
      recent.unshift(name);
      if (recent.length > 5) recent = recent.slice(0, 5);
      localStorage.setItem('elijahGamesRecent', JSON.stringify(recent));
      renderRecent();
    }

    function renderRecent() {
      const recent = JSON.parse(localStorage.getItem('elijahGamesRecent') || '[]');
      const section = document.getElementById('recent-section');
      const list = document.getElementById('recent-list');

      if (recent.length === 0) {
        section.classList.add('hidden');
        return;
      }

      section.classList.remove('hidden');
      list.innerHTML = recent.map(name => `
        <div class="game-item flex items-center gap-3 px-3 py-2 rounded-lg cursor-default">
          <div class="w-7 h-7 rounded bg-indigo-500/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
            </svg>
          </div>
          <span class="text-gray-400 text-sm truncate">${name}</span>
        </div>
      `).join('');
    }

    // === Particles ===
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = [];
      const count = Math.floor((canvas.width * canvas.height) / 15000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          size: Math.random() * 1.5 + 0.5,
          alpha: Math.random() * 0.3 + 0.1
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(99, 102, 241, ${p.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
    resizeCanvas();
    createParticles();
    animateParticles();
    renderRecent();
  </script>

</body>
</html>
