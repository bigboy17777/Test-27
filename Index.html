<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elijah’s Proxy V7</title>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap');
    
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .header {
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem;
      text-shadow: 0 0 20px #6e40ff, 0 0 40px #6e40ff;
      margin-bottom: 20px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #6e40ff; }
      to { text-shadow: 0 0 40px #ff00ff, 0 0 60px #ff00ff; }
    }
    .search-container {
      width: 80%;
      max-width: 800px;
      position: relative;
    }
    #url-input {
      width: 100%;
      padding: 20px 60px 20px 25px;
      font-size: 1.5rem;
      border: none;
      border-radius: 50px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #url-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    #go-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      padding: 15px 30px;
      font-size: 1.5rem;
      background: #6e40ff;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    #go-btn:hover {
      background: #ff00ff;
      transform: translateY(-50%) scale(1.1);
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1 class="header">Elijah’s Proxy V7</h1>
  <div class="search-container">
    <input type="text" id="url-input" placeholder="Enter URL (e.g. google.com, youtube.com)" />
    <button id="go-btn">GO</button>
  </div>
  <iframe id="proxy-frame"></iframe>
  <div class="footer">Powered by Ultraviolet • Made with ❤️ by Elijah</div>

  <script>
    const input = document.getElementById('url-input');
    const btn = document.getElementById('go-btn');
    const frame = document.getElementById('proxy-frame');

    function go() {
      let url = input.value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      const encoded = __uv$config.encodeUrl(url);
      frame.src = __uv$config.prefix + encoded;
      frame.style.display = 'block';
      document.querySelector('.search-container').style.display = 'none';
      document.querySelector('.header').style.display = 'none';
    }

    btn.onclick = go;
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') go();
    });

    // Allow going back to search
    window.addEventListener('message', e => {
      if (e.data === 'uv-go-home') {
        frame.src = 'about:blank';
        frame.style.display = 'none';
        document.querySelector('.search-container').style.display = 'block';
        document.querySelector('.header').style.display = 'block';
        input.value = '';
      }
    });
  </script>
</body>
</html>
