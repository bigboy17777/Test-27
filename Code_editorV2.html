<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elijah's Code Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .toolbar {
            display: flex;
            gap: 8px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #e6edf3;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:hover {
            background: #30363d;
            border-color: #484f58;
        }

        .btn.primary {
            background: linear-gradient(135deg, #238636, #2ea043);
            border-color: #238636;
        }

        .btn.primary:hover {
            background: linear-gradient(135deg, #2ea043, #3fb950);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #left {
            width: 50%;
            min-width: 200px;
        }

        .pane-header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pane-header .lang-badge {
            background: #30363d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #58a6ff;
            text-transform: lowercase;
        }

        #divider {
            width: 6px;
            background: #21262d;
            cursor: col-resize;
            z-index: 100;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        #divider:hover, #divider.active {
            background: #3b82f6;
        }

        #right {
            flex: 1;
            min-width: 200px;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .editor {
            position: absolute;
            inset: 0;
            resize: none;
            border: none;
            outline: none;
            background: #0d1117;
            color: #e6edf3;
            padding: 16px;
            padding-left: 60px;
            font-family: 'JetBrains Mono', Menlo, Monaco, monospace;
            font-size: 14px;
            line-height: 22px;
            tab-size: 2;
            overflow: auto;
            white-space: pre;
            caret-color: #58a6ff;
        }

        .editor::placeholder {
            color: #484f58;
        }

        .editor::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        .editor::-webkit-scrollbar-track {
            background: #0d1117;
        }

        .editor::-webkit-scrollbar-thumb {
            background: #30363d;
            border: 3px solid #0d1117;
            border-radius: 7px;
        }

        .editor::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .line-numbers {
            position: absolute;
            top: 16px;
            left: 0;
            width: 52px;
            text-align: right;
            padding-right: 16px;
            color: #484f58;
            font-family: 'JetBrains Mono', Menlo, Monaco, monospace;
            font-size: 14px;
            line-height: 22px;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }

        #preview {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .code-output {
            padding: 16px;
            overflow: auto;
            background: #0d1117;
            height: 100%;
        }

        .code-output pre {
            margin: 0;
            font-family: 'JetBrains Mono', Menlo, Monaco, monospace;
            font-size: 14px;
            line-height: 22px;
        }

        .code-output::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        .code-output::-webkit-scrollbar-track {
            background: #0d1117;
        }

        .code-output::-webkit-scrollbar-thumb {
            background: #30363d;
            border: 3px solid #0d1117;
            border-radius: 7px;
        }

        .output-wrapper {
            flex: 1;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8b949e;
            flex-shrink: 0;
        }

        .status-left, .status-right {
            display: flex;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #238636;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #484f58;
            text-align: center;
            padding: 40px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #8b949e;
        }

        .empty-state p {
            font-size: 14px;
        }

    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>Elijah's Code Editor</h1>
    </div>
    <div class="toolbar">
        <button class="btn" onclick="newFile()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New
        </button>
        <button class="btn" onclick="copyCode()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            Copy
        </button>
        <button class="btn primary" onclick="downloadCode()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download
        </button>
    </div>
</div>

<!-- Main Container -->
<div class="container">
    <div class="pane" id="left">
        <div class="pane-header">
            <span>Editor</span>
            <span class="lang-badge" id="langBadge">plaintext</span>
        </div>
        <div class="editor-wrapper">
            <div class="line-numbers" id="lines">1</div>
            <textarea 
                class="editor" 
                id="editor" 
                placeholder="Start typing or paste your code here..."
                spellcheck="false"
            ></textarea>
        </div>
    </div>
    <div id="divider"></div>
    <div class="pane" id="right">
        <div class="pane-header">
            <span>Preview</span>
        </div>
        <div class="output-wrapper">
            <div id="output">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                    <h3>No code yet</h3>
                    <p>Start typing in the editor to see the preview</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
    <div class="status-left">
        <span class="status-item" id="cursorPos">Ln 1, Col 1</span>
        <span class="status-item" id="charCount">0 characters</span>
    </div>
    <div class="status-right">
        <span class="status-item" id="langStatus">Plaintext</span>
        <span class="status-item">UTF-8</span>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Copied to clipboard!</div>

<script type="module">
import { createHighlighter } from 'https://esm.sh/shiki@1.22.0';

let highlighter;
let isDragging = false;
let currentLang = 'plaintext';

// Initialize syntax highlighter
async function init() {
    highlighter = await createHighlighter({
        themes: ['github-dark'],
        langs: ['javascript', 'typescript', 'python', 'html', 'css', 'json', 'markdown', 'java', 'c', 'cpp', 'csharp', 'go', 'rust', 'php', 'ruby', 'swift', 'kotlin', 'sql', 'bash', 'yaml', 'xml', 'jsx', 'tsx']
    });
    
    // Load saved code
    const saved = localStorage.getItem('elijahCodeEditor');
    if (saved) {
        editor.value = saved;
    }
    
    update();
}

init();

// Divider drag logic
const divider = document.getElementById('divider');
const left = document.getElementById('left');

divider.addEventListener('mousedown', (e) => {
    isDragging = true;
    divider.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const containerWidth = document.querySelector('.container').offsetWidth;
    const newWidth = Math.max(200, Math.min(e.clientX, containerWidth - 200));
    left.style.width = `${newWidth}px`;
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    divider.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
});

// Editor elements
const editor = document.getElementById('editor');
const output = document.getElementById('output');
const lines = document.getElementById('lines');
const langBadge = document.getElementById('langBadge');
const langStatus = document.getElementById('langStatus');
const cursorPos = document.getElementById('cursorPos');
const charCount = document.getElementById('charCount');

// Tab support
editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
        update();
    }
    
    // Auto-close brackets
    const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
    if (pairs[e.key]) {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const selected = editor.value.substring(start, end);
        editor.value = editor.value.substring(0, start) + e.key + selected + pairs[e.key] + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 1;
        update();
    }
});

editor.addEventListener('input', update);
editor.addEventListener('click', updateCursor);
editor.addEventListener('keyup', updateCursor);
editor.addEventListener('scroll', syncScroll);

function syncScroll() {
    lines.style.top = (16 - editor.scrollTop) + 'px';
}

function updateCursor() {
    const text = editor.value.substring(0, editor.selectionStart);
    const lineNum = text.split('\n').length;
    const colNum = text.split('\n').pop().length + 1;
    cursorPos.textContent = `Ln ${lineNum}, Col ${colNum}`;
}

// Detect language from code
function detectLanguage(code) {
    const trimmed = code.trim();
    
    if (!trimmed) return 'plaintext';
    
    // HTML detection
    if (/<(!DOCTYPE|html|head|body|div|span|p|a|script|style|link|meta)/i.test(trimmed)) return 'html';
    
    // CSS detection
    if (/^[\s\S]*\{[\s\S]*:[\s\S]*;[\s\S]*\}/.test(trimmed) && !/function|const|let|var|=>/.test(trimmed)) return 'css';
    
    // JSON detection
    if (/^[\s]*[\[{]/.test(trimmed) && /[\]}][\s]*$/.test(trimmed)) {
        try { JSON.parse(trimmed); return 'json'; } catch {}
    }
    
    // Python detection
    if (/^(import |from |def |class |print\(|if __name__|#.*python)/mi.test(trimmed)) return 'python';
    
    // TypeScript/TSX detection
    if (/^(interface |type |:\s*(string|number|boolean|any)\b|<[A-Z]\w*>)/m.test(trimmed)) {
        return /<[A-Z][a-z]+/.test(trimmed) ? 'tsx' : 'typescript';
    }
    
    // JSX detection
    if (/<[A-Z][a-z]+/.test(trimmed) && /import|export|const|function/.test(trimmed)) return 'jsx';
    
    // JavaScript detection
    if (/^(const |let |var |function |import |export |class |=>|console\.)/m.test(trimmed)) return 'javascript';
    
    // Java detection
    if (/^(public |private |protected |class |void |int |String |System\.out)/m.test(trimmed)) return 'java';
    
    // C# detection
    if (/^(using |namespace |public class |Console\.Write|static void Main)/m.test(trimmed)) return 'csharp';
    
    // Go detection
    if (/^(package |import \(|func |fmt\.Print)/m.test(trimmed)) return 'go';
    
    // Rust detection
    if (/^(fn |let mut |pub fn |impl |use std::)/m.test(trimmed)) return 'rust';
    
    // PHP detection
    if (/<\?php|echo |function.*\$|\$\w+\s*=/.test(trimmed)) return 'php';
    
    // Ruby detection
    if (/^(def |end$|puts |require |class \w+ < )/m.test(trimmed)) return 'ruby';
    
    // SQL detection
    if (/^(SELECT |INSERT |UPDATE |DELETE |CREATE |DROP |ALTER )/mi.test(trimmed)) return 'sql';
    
    // Bash detection
    if (/^(#!\/bin\/(bash|sh)|echo |export |if \[\[)/m.test(trimmed)) return 'bash';
    
    // YAML detection
    if (/^\w+:\s*(\n|$)/m.test(trimmed) && !/{|}/.test(trimmed)) return 'yaml';
    
    // Markdown detection
    if (/^(#{1,6} |[*-] |\d+\. |```)/m.test(trimmed)) return 'markdown';
    
    // C/C++ detection
    if (/#include|int main\(|printf\(|iostream/.test(trimmed)) {
        return /iostream|cout|cin|::/.test(trimmed) ? 'cpp' : 'c';
    }
    
    return 'plaintext';
}

// Main update function
function update() {
    const code = editor.value;
    
    // Save to localStorage
    localStorage.setItem('elijahCodeEditor', code);
    
    // Update line numbers
    const lineCount = Math.max(1, code.split('\n').length);
    lines.innerHTML = Array.from({ length: lineCount }, (_, i) => i + 1).join('<br>');
    
    // Update character count
    charCount.textContent = `${code.length} characters`;
    
    if (!code.trim()) {
        output.innerHTML = `
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
                <h3>No code yet</h3>
                <p>Start typing in the editor to see the preview</p>
            </div>
        `;
        langBadge.textContent = 'plaintext';
        langStatus.textContent = 'Plaintext';
        currentLang = 'plaintext';
        return;
    }
    
    // Detect language
    const lang = detectLanguage(code);
    currentLang = lang;
    langBadge.textContent = lang;
    langStatus.textContent = lang.charAt(0).toUpperCase() + lang.slice(1);
    
    // If HTML, render live preview
    if (lang === 'html') {
        output.innerHTML = `<iframe id="preview" srcdoc="${code.replace(/"/g, '&quot;')}"></iframe>`;
    } else if (highlighter) {
        // Syntax highlight other languages
        try {
            const html = highlighter.codeToHtml(code, {
                lang: lang === 'plaintext' ? 'text' : lang,
                theme: 'github-dark'
            });
            output.innerHTML = `<div class="code-output">${html}</div>`;
        } catch {
            output.innerHTML = `<div class="code-output"><pre>${escapeHtml(code)}</pre></div>`;
        }
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Toolbar functions
window.newFile = function() {
    if (editor.value && !confirm('Create a new file? Your current code will be cleared.')) return;
    editor.value = '';
    update();
    showToast('New file created');
};

window.copyCode = function() {
    navigator.clipboard.writeText(editor.value).then(() => {
        showToast('Copied to clipboard!');
    });
};

window.downloadCode = function() {
    const extensions = {
        html: 'html', css: 'css', javascript: 'js', typescript: 'ts',
        jsx: 'jsx', tsx: 'tsx', python: 'py', java: 'java',
        csharp: 'cs', go: 'go', rust: 'rs', php: 'php',
        ruby: 'rb', sql: 'sql', bash: 'sh', yaml: 'yml',
        json: 'json', markdown: 'md', c: 'c', cpp: 'cpp',
        xml: 'xml', plaintext: 'txt'
    };
    
    const ext = extensions[currentLang] || 'txt';
    const blob = new Blob([editor.value], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `code.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('File downloaded!');
};

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// Initial cursor position
updateCursor();

</script>

</body>
</html>
