<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elijah’s Code Editor</title>

  <!-- Prism.js Syntax Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-one-dark.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: linear-gradient(135deg, #6e8efb, #a777e8);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .controls {
      padding: 14px;
      background: #252526;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }
    select, button {
      padding: 11px 18px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    select { background: #3c3c3c; color: white; }
    button {
      background: #6e8efb;
      color: white;
      font-weight: bold;
    }
    button:hover { background: #5a78e0; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .editor, .output {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    textarea, pre {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      margin: 0; padding: 20px;
      border: none;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }
    textarea {
      background: transparent;
      color: transparent;
      caret-color: #fff;
      z-index: 2;
    }
    pre {
      z-index: 1;
      pointer-events: none;
      overflow: auto;
    }
    code { display: block; }
    .output {
      background: white;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    footer {
      text-align: center;
      padding: 12px;
      background: #252526;
      font-size: 0.95rem;
      color: #aaa;
    }
    .status {
      padding: 8px;
      background: #333;
      text-align: center;
      font-size: 0.9rem;
      color: #0f0;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header>Elijah’s Code Editor</header>

  <div class="controls">
    <select id="language">
      <option value="html">HTML</option>
      <option value="javascript">JavaScript</option>
      <option value="css">CSS</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
      <option value="cpp">C++</option>
      <option value="php">PHP</option>
      <option value="json">JSON</option>
      <option value="typescript">TypeScript</option>
      <option value="go">Go</option>
      <option value="rust">Rust</option>
    </select>
    <button onclick="runCode()">Preview Now</button>
    <button onclick="clearCode()">Clear All</button>
    <button onclick="copyCode()">Copy Code</button>
  </div>

  <div class="status" id="status">Auto-preview enabled • Live updates on every change!</div>

  <div class="container">
    <div class="editor">
      <textarea id="code" spellcheck="false" placeholder="Start coding, Elijah! Every change auto-previews instantly!">
// Elijah’s Code Editor — Instant Live Preview!

alert("Hello Elijah! You're amazing!");

document.body.style.cssText = `
  font-family: Arial;
  text-align: center;
  padding: 50px;
  background: linear-gradient(45deg, #6e8efb, #a777e8);
  color: white;
`;

document.body.innerHTML = `
  <h1>Elijah’s Code Editor</h1>
  <p>This preview updates <strong>instantly</strong> as you type!</p>
  <h2>Keep coding — you're doing great!</h2>
`;
      </textarea>
      <pre><code id="highlight" class="language-javascript"></code></pre>
    </div>

    <div class="output">
      <iframe id="preview" sandbox="allow-scripts allow-modals allow-popups"></iframe>
    </div>
  </div>

  <footer>Made with love and power for Elijah — The Best Coder</footer>

  <script>
    const textarea = document.getElementById('code');
    const highlight = document.getElementById('highlight');
    const languageSelect = document.getElementById('language');
    const iframe = document.getElementById('preview');
    const status = document.getElementById('status');

    // Auto-preview on every change (typing, pasting, deleting)
    let timeout;
    function autoPreview() {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        runCode();
        status.textContent = "Auto-preview updated just now!";
        setTimeout(() => status.textContent = "Auto-preview enabled • Live updates on every change!", 2000);
      }, 150); // Smooth debounce
    }

    // Manual preview function
    function runCode() {
      const code = textarea.value.trim() || "<h3 style='color:#666;text-align:center;padding:50px;'>Preview will appear here...</h3>";
      const blob = new Blob([code], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      iframe.src = url;
      setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    function updateHighlight() {
      const code = textarea.value;
      const lang = languageSelect.value === 'html' ? 'markup' : languageSelect.value;
      highlight.className = `language-${lang}`;
      highlight.textContent = code || ' ';
      Prism.highlightElement(highlight);
    }

    function clearCode() {
      if (confirm("Delete all code?")) {
        textarea.value = "";
        updateHighlight();
        iframe.src = "about:blank";
        status.textContent = "Cleared! Start fresh, Elijah!";
      }
    }

    function copyCode() {
      textarea.select();
      document.execCommand('copy');
      status.textContent = "Copied to clipboard! You're unstoppable!";
      setTimeout(() => status.textContent = "Auto-preview enabled • Live updates on every change!", 2000);
    }

    // Sync scroll
    textarea.addEventListener('scroll', () => {
      highlight.scrollTop = textarea.scrollTop;
      highlight.scrollLeft = textarea.scrollLeft;
    });

    // Auto-update on ANY change
    textarea.addEventListener('input', () => {
      updateHighlight();
      autoPreview(); // This triggers instant preview
    });

    textarea.addEventListener('paste', () => {
      setTimeout(() => {
        updateHighlight();
        autoPreview();
      }, 10);
    });

    languageSelect.addEventListener('change', updateHighlight);

    // Initial load
    updateHighlight();
    runCode();
  </script>
</body>
</html>
